<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <header class="header">
        <a href="{{ '/' | relative_url }}" class="header__logo-link">
            <img src="{{ '/images/logo.png' | relative_url }}" alt="BitNinja Technology Logo" class="header__logo">
            <img src="{{ '/images/name.png' | relative_url }}" alt="BitNinja Technology" class="header__name-image">
        </a>
        <button class="header__nav-toggle" aria-label="Toggle navigation menu">
            <span class="header__nav-toggle-icon"></span>
            <span class="header__nav-toggle-icon"></span>
            <span class="header__nav-toggle-icon"></span>
        </button>
    </header>

  <main class="page-content container">
    {{ content }}
  </main>

  <footer class="footer">
        <div class="footer__content">
            <a href="https://bitninja.net" target="_blank" rel="noopener noreferrer" class="footer-logo-link">
                <img src="{{ '/images/name.png' | relative_url }}" alt="BitNinja Technology" class="footer__logo">
            </a>
            <div class="footer__text">
                <p><strong>BitNinja Technology<sup>™</sup></strong> is a trademark application of BitNinja Technology (7302564), a proprietorship registered under UDYAM-MH-26-0996429. Reach us at <a href="mailto:info@bitninja.net" target="_blank" rel="noopener noreferrer">info@bitninja.net</a>.</p>
            </div>
        </div>
    </footer>
</body>
</html>
