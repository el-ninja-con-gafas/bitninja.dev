---
layout: base
---
<!-- Floating Toggle Button (Top Left) -->
<button id="toc-toggle-btn" class="toc-toggle-btn" aria-label="Toggle Table of Contents" title="Toggle Tree View">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>

<!-- Fixed Left Sidebar for TOC -->
<aside class="toc-sidebar" id="toc-sidebar">
  <div class="toc-header">
    <h4>Contents</h4>
    <button id="toc-close-btn" class="toc-close-btn" aria-label="Close Table of Contents">✕</button>
  </div>
  <div id="toc-content" class="toc-content">
    <!-- JS will inject the TOC here -->
  </div>
</aside>

<!-- Main Article Content -->
<article class="post-content" id="main-article">
  <header class="post-header">
    <h1 class="post-page-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      • 
      {% assign words = content | strip_html | number_of_words %}
      {% assign reading_time = words | divided_by: 180 | plus: 1 %}
      {{ reading_time }} min read
    </p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const contentImages = document.querySelectorAll('.post-body img');
    
    contentImages.forEach(function(img) {
      const altText = img.getAttribute('alt');
      
      if (altText && altText.trim() !== "") {
        const caption = document.createElement('span');
        caption.className = 'image-caption';
        caption.textContent = altText;
        
        img.parentNode.insertBefore(caption, img.nextSibling);
      }
    });
  });
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // --- 1. Sidebar Toggle Logic ---
  const sidebar = document.getElementById('toc-sidebar');
  const toggleBtn = document.getElementById('toc-toggle-btn');
  const closeBtn = document.getElementById('toc-close-btn');

  function openSidebar() { sidebar.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); }

  toggleBtn.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebar);

  // Close sidebar when clicking outside of it (optional but good for UX)
  document.addEventListener('click', function(event) {
    if (sidebar.classList.contains('open') && 
        !sidebar.contains(event.target) && 
        !toggleBtn.contains(event.target)) {
      closeSidebar();
    }
  });

  // --- 2. Generate TOC ---
  const article = document.querySelector('.post-body');
  const tocContainer = document.getElementById('toc-content');
  const headings = article.querySelectorAll('h1, h2, h3, h4, h5, h6');
  
  if (headings.length === 0) {
    toggleBtn.style.display = 'none'; // Hide button if no headings exist
    return;
  }

  const list = document.createElement('ul');
  list.style.listStyleType = 'none';
  list.style.paddingLeft = '0';
  
  headings.forEach((heading, index) => {
    if (!heading.id) heading.id = 'heading-' + index; // Ensure ID exists
    
    const level = parseInt(heading.tagName.charAt(1));
    const li = document.createElement('li');
    li.style.marginLeft = ((level - 1) * 12) + 'px';
    li.style.marginBottom = '6px';
    
    const a = document.createElement('a');
    a.href = '#' + heading.id;
    a.textContent = heading.textContent;
    a.className = 'toc-link'; // Class for CSS styling and selecting
    a.dataset.targetId = heading.id; // Store target ID for the observer

    // Clicking a link on mobile should close the sidebar
    a.addEventListener('click', () => {
      if (window.innerWidth < 1024) closeSidebar();
    });

    li.appendChild(a);
    list.appendChild(li);
  });
  
  tocContainer.appendChild(list);

  // --- 3. Intersection Observer for Active State ---
  const tocLinks = document.querySelectorAll('.toc-link');
  
  // Set up the observer options (trigger when heading is near the top of viewport)
  const observerOptions = {
    root: null,
    rootMargin: '0px 0px -80% 0px', // Triggers when heading is in the top 20% of screen
    threshold: 1.0
  };

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // Remove active class from all links
        tocLinks.forEach(link => link.classList.remove('active'));
        
        // Add active class to the currently intersecting heading's link
        const activeLink = document.querySelector(`.toc-link[data-target-id="${entry.target.id}"]`);
        if (activeLink) {
          activeLink.classList.add('active');
          // Optional: Scroll the sidebar to keep the active link in view
          activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    });
  }, observerOptions);

  // Observe all headings
  headings.forEach(heading => observer.observe(heading));
});
</script>
