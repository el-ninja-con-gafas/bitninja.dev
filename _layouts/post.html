---
layout: base
---
<article class="post-content">
  <header class="post-header">
    <h1 class="post-page-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
